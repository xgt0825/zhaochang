<!DOCTYPE html><html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%E5%8D%97%E4%BA%AC%E8%99%B9%E7%A8%8B%E6%8B%9B%E5%B7%A5%22%2C%22short_name%22%3A%22%E6%8B%9B%E5%B7%A5%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22f59e0b%22%2C%22theme_color%22%3A%22f59e0b%22%7D" />
<title>找厂神器 · 虹程人力资源</title>
<style>
/* ===== Design System ===== */
:root {
  /* Brand — warm amber/gold with depth */
  --amber-900: #78350f;
  --amber-800: #92400e;
  --amber-700: #b45309;
  --amber-600: #d97706;
  --amber-500: #f59e0b;
  --amber-400: #fbbf24;
  --amber-300: #fcd34d;
  --amber-100: #fef3c7;
  --amber-50:  #fffbeb;

  /* Neutrals — warm stone */
  --stone-900: #1c1917;
  --stone-800: #292524;
  --stone-700: #44403c;
  --stone-600: #57534e;
  --stone-500: #78716c;
  --stone-400: #a8a29e;
  --stone-300: #d6d3d1;
  --stone-200: #e7e5e4;
  --stone-100: #f5f5f4;
  --stone-50:  #fafaf9;

  /* Semantic */
  --red-600: #dc2626;
  --red-50:  #fef2f2;
  --green-600: #059669;
  --green-50:  #ecfdf5;
  --blue-600: #2563eb;
  --blue-50:  #eff6ff;

  /* Token mapping */
  --color-primary: var(--amber-600);
  --color-primary-deep: var(--amber-800);
  --color-accent: var(--amber-500);
  --color-bg: var(--stone-100);
  --color-surface: #ffffff;
  --color-text: var(--stone-900);
  --color-text-secondary: var(--stone-600);
  --color-text-muted: var(--stone-400);
  --color-border: var(--stone-200);
  --color-border-light: var(--stone-100);

  /* Shadows — layered, tinted */
  --shadow-xs: 0 1px 2px rgba(28,25,23,0.04);
  --shadow-sm: 0 1px 3px rgba(28,25,23,0.06), 0 1px 2px rgba(28,25,23,0.04);
  --shadow-md: 0 4px 12px rgba(28,25,23,0.08), 0 2px 4px rgba(28,25,23,0.04);
  --shadow-lg: 0 8px 30px rgba(28,25,23,0.10), 0 4px 8px rgba(28,25,23,0.04);
  --shadow-xl: 0 20px 60px rgba(28,25,23,0.14), 0 8px 20px rgba(28,25,23,0.06);

  /* Radii */
  --radius-xs: 6px;
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --radius-full: 9999px;

  /* Easing */
  --ease-out-expo: cubic-bezier(0.16,1,0.3,1);
  --ease-spring: cubic-bezier(0.34,1.56,0.64,1);

  /* Safe area */
  --safe-bottom: env(safe-area-inset-bottom,0px);
  --safe-top: env(safe-area-inset-top,0px);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  background:var(--color-bg);color:var(--color-text);line-height:1.6;
  padding-bottom:calc(20px + var(--safe-bottom));
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  overflow-x:hidden;
}

/* ===== Header — layered depth ===== */
.header{
  position:relative;
  background:linear-gradient(165deg,var(--amber-900) 0%,var(--amber-700) 40%,var(--amber-600) 100%);
  overflow:hidden;
}
.header::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 100% 70% at 0% 100%,rgba(251,191,36,0.15),transparent 60%),
    radial-gradient(ellipse 60% 50% at 100% 0%,rgba(255,255,255,0.10),transparent 50%);
  pointer-events:none;
}
.header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.20),transparent);
}
.header-title{
  font-size:1.08rem;font-weight:800;letter-spacing:4px;
  color:#fff;text-align:center;
  padding:16px 20px 12px;position:relative;z-index:1;
  text-shadow:0 1px 2px rgba(0,0,0,0.10);
}

/* ===== WeChat Bar — glassmorphism ===== */
.wechat-bar{
  position:sticky;top:0;z-index:102;
  background:linear-gradient(135deg,rgba(146,64,14,0.97),rgba(180,83,9,0.97));
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 16px;user-select:text;-webkit-user-select:text;
  box-shadow:0 2px 12px rgba(120,53,15,0.20);
}
.wechat-bar .label{font-size:0.75rem;color:rgba(255,255,255,0.70);font-weight:500}
.wechat-bar .wechat-id{
  font-size:0.88rem;color:#fff;font-weight:700;letter-spacing:0.8px;
  padding:0 2px;
}
.wechat-bar .copy-badge{
  font-size:0.58rem;font-weight:600;color:var(--amber-800);
  background:linear-gradient(135deg,var(--amber-400),var(--amber-300));
  padding:2px 8px;border-radius:var(--radius-xs);margin-left:2px;
  animation:pulse-soft 2.5s ease-in-out infinite;
}
@keyframes pulse-soft{0%,100%{opacity:1}50%{opacity:0.65}}
.wechat-bar .copy-badge.copied{background:var(--green-50);color:var(--green-600);animation:none}
.wechat-bar .copy-btn{
  font-size:0.65rem;font-weight:600;color:#fff;
  background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.20);
  padding:3px 10px;border-radius:var(--radius-full);cursor:pointer;
  transition:all 0.2s var(--ease-out-expo);touch-action:manipulation;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.wechat-bar .copy-btn:active{transform:scale(0.92);background:rgba(255,255,255,0.22)}

/* ===== Tab Bar ===== */
.tab-bar{
  position:sticky;top:40px;z-index:101;
  display:flex;background:rgba(255,255,255,0.85);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--color-border-light);
}
.tab-btn{
  flex:1;border:none;background:transparent;
  padding:12px 0 10px;font-size:0.82rem;font-weight:600;
  color:var(--color-text-muted);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  transition:color 0.25s var(--ease-out-expo);position:relative;
}
.tab-btn .tab-icon{font-size:1.05rem;line-height:1;opacity:0.7;transition:opacity 0.25s}
.tab-btn.active{color:var(--color-primary)}
.tab-btn.active .tab-icon{opacity:1}
.tab-btn.active::after{
  content:'';position:absolute;bottom:0;left:28%;right:28%;
  height:2.5px;background:linear-gradient(90deg,var(--amber-400),var(--amber-600));
  border-radius:2px 2px 0 0;
}
.tab-btn:active{opacity:0.6}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ===== Search ===== */
.search-wrap{
  position:sticky;top:96px;z-index:99;
  background:var(--color-bg);padding:12px 16px 10px;
}
.search-bar{
  display:flex;align-items:center;gap:10px;
  background:var(--color-surface);border-radius:var(--radius-xl);
  padding:10px 18px;
  box-shadow:var(--shadow-xs);
  border:1.5px solid var(--color-border-light);
  transition:border-color 0.25s var(--ease-out-expo),box-shadow 0.25s var(--ease-out-expo);
}
.search-bar:focus-within{
  border-color:var(--amber-300);
  box-shadow:0 0 0 4px rgba(217,119,6,0.08),var(--shadow-sm);
}
.search-icon{font-size:0.95rem;flex-shrink:0;opacity:0.35;transition:opacity 0.25s}
.search-bar:focus-within .search-icon{opacity:0.55}
.search-input{
  flex:1;border:none;outline:none;font-size:0.88rem;
  color:var(--color-text);background:transparent;-webkit-appearance:none;
}
.search-input::placeholder{color:var(--color-text-muted)}
.btn-search-clear{
  width:24px;height:24px;border-radius:50%;
  border:none;background:var(--color-border);color:var(--color-text-secondary);
  font-size:0.7rem;cursor:pointer;display:none;
  align-items:center;justify-content:center;
  transition:background 0.15s;
}
.btn-search-clear:active{background:var(--stone-300)}
.btn-search-clear.visible{display:flex}

/* ===== Filter ===== */
.filter-section{padding:0 16px}
.filter-group{margin-bottom:2px}
.filter-label{
  font-size:0.65rem;font-weight:600;color:var(--color-text-muted);
  padding:10px 4px 6px;letter-spacing:0.5px;text-transform:uppercase;
}
.filter-row{
  display:flex;gap:6px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px;
}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{
  flex-shrink:0;padding:6px 16px;border-radius:var(--radius-full);
  border:1.5px solid var(--color-border);background:var(--color-surface);
  font-size:0.76rem;color:var(--color-text-secondary);
  cursor:pointer;transition:all 0.2s var(--ease-out-expo);
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.filter-chip:active{transform:scale(0.94)}
.filter-chip.active{
  background:linear-gradient(135deg,var(--amber-600),var(--amber-500));
  color:#fff;border-color:var(--amber-500);
  box-shadow:0 2px 8px rgba(217,119,6,0.25);
  font-weight:600;
}

/* ===== Result Count ===== */
.result-count{
  padding:12px 16px 6px;font-size:0.7rem;color:var(--color-text-muted);
  font-weight:500;letter-spacing:0.3px;
}

/* ===== Factory Cards ===== */
.factory-list{padding:0 16px 20px;display:flex;flex-direction:column;gap:12px}

.factory-card{
  position:relative;
  background:var(--color-surface);border-radius:var(--radius-md);
  padding:18px 16px 14px;
  box-shadow:var(--shadow-xs);
  transition:transform 0.2s var(--ease-out-expo),box-shadow 0.25s var(--ease-out-expo);
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  overflow:hidden;
}
.factory-card::before{
  content:'';position:absolute;top:0;left:0;width:3px;height:100%;
  background:linear-gradient(180deg,var(--amber-400),var(--amber-600));
  border-radius:0 2px 2px 0;
}
.factory-card:active{transform:scale(0.97);box-shadow:var(--shadow-sm)}
.factory-card:hover{box-shadow:var(--shadow-md)}

.card-header{
  display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;
}
.card-title{
  font-size:1rem;font-weight:700;line-height:1.35;color:var(--color-text);
  letter-spacing:-0.01em;
}
.card-area{
  flex-shrink:0;font-size:0.62rem;font-weight:600;
  padding:3px 10px;border-radius:var(--radius-full);
  background:var(--amber-50);color:var(--amber-700);
  border:1px solid var(--amber-100);
  letter-spacing:0.3px;margin-top:1px;
}

.card-info-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;
  font-size:0.75rem;color:var(--color-text-secondary);
  background:var(--stone-50);border-radius:var(--radius-xs);
  padding:8px 12px;margin-bottom:10px;
}
.card-info-grid span{display:flex;align-items:center;gap:5px}
.card-info-grid .label{color:var(--color-text-muted);font-size:0.68rem;min-width:2em}
.card-info-grid .value{font-weight:500;color:var(--color-text)}

.card-salary{
  padding:8px 12px;
  background:linear-gradient(135deg,var(--red-50),#fff);
  border:1px solid rgba(220,38,38,0.08);
  border-radius:var(--radius-xs);
  font-size:0.8rem;font-weight:700;color:var(--red-600);
  line-height:1.45;margin-bottom:8px;
}

.card-tags{
  display:flex;flex-wrap:wrap;gap:5px;
}
.tag{
  font-size:0.62rem;padding:3px 9px;border-radius:var(--radius-xs);
  font-weight:500;white-space:nowrap;line-height:1.4;
  transition:all 0.15s;
}
.tag.blue{background:var(--blue-50);color:var(--blue-600)}
.tag.green{background:var(--green-50);color:var(--green-600)}
.tag.amber{background:var(--amber-100);color:var(--amber-800)}
.tag.red{background:var(--red-50);color:var(--red-600)}

.card-features{
  margin-top:8px;font-size:0.67rem;color:var(--color-text-muted);
  display:flex;align-items:center;gap:5px;
  border-top:1px dashed var(--color-border);padding-top:8px;
  line-height:1.5;
}

/* ===== Quick Pick ===== */
.quick-pick{padding:12px 16px 6px}
.quick-pick-title{
  font-size:0.68rem;font-weight:600;color:var(--color-text-muted);
  padding:0 4px 10px;letter-spacing:0.5px;
}
.quick-pick-row{
  display:flex;gap:8px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:6px;
}
.quick-pick-row::-webkit-scrollbar{display:none}
.quick-pick-item{
  flex-shrink:0;padding:8px 18px;
  background:var(--color-surface);border:1.5px solid var(--amber-200);
  border-radius:var(--radius-full);white-space:nowrap;
  font-size:0.76rem;font-weight:600;color:var(--amber-700);
  cursor:pointer;transition:all 0.2s var(--ease-out-expo);
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  box-shadow:var(--shadow-xs);
}
.quick-pick-item:active{transform:scale(0.94);background:var(--amber-50);border-color:var(--amber-400)}

/* ===== Recommend Tab ===== */
.rec-section{padding:6px 16px 80px}
.rec-section-title{
  font-size:0.82rem;font-weight:700;color:var(--color-text);
  padding:10px 4px 8px;display:flex;align-items:center;gap:6px;
}

.rec-card{
  position:relative;
  background:var(--color-surface);border-radius:var(--radius-md);
  padding:18px 16px 14px;box-shadow:var(--shadow-xs);margin-bottom:12px;
  border:1px solid var(--color-border-light);
  cursor:pointer;transition:transform 0.2s var(--ease-out-expo),box-shadow 0.25s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.rec-card::before{
  content:'';position:absolute;top:0;left:0;width:3px;height:100%;
  background:linear-gradient(180deg,var(--amber-400),var(--amber-500));
  border-radius:0 2px 2px 0;
}
.rec-card:active{transform:scale(0.97)}
.rec-card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.rec-card-star{
  color:var(--amber-400);font-size:0.85rem;flex-shrink:0;
  filter:drop-shadow(0 1px 2px rgba(217,119,6,0.15));
}
.rec-card-name{font-size:1rem;font-weight:700}
.rec-card-area{
  margin-left:auto;font-size:0.62rem;font-weight:600;
  padding:3px 10px;border-radius:var(--radius-full);
  background:var(--amber-50);color:var(--amber-700);border:1px solid var(--amber-100);
  flex-shrink:0;letter-spacing:0.3px;
}
.rec-card-info{
  display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;
  font-size:0.75rem;color:var(--color-text-secondary);
  background:var(--stone-50);border-radius:var(--radius-xs);
  padding:8px 12px;margin-bottom:10px;
}
.rec-card-info span{display:flex;align-items:center;gap:5px}
.rec-card-info .label{color:var(--color-text-muted);font-size:0.68rem;min-width:2em}
.rec-card-info .value{font-weight:500;color:var(--color-text)}
.rec-card-salary{
  padding:8px 12px;
  background:linear-gradient(135deg,var(--red-50),#fff);
  border:1px solid rgba(220,38,38,0.08);
  border-radius:var(--radius-xs);
  font-size:0.8rem;font-weight:700;color:var(--red-600);line-height:1.45;margin-bottom:8px;
}
.rec-card-tags{display:flex;flex-wrap:wrap;gap:5px}

/* ===== Detail Modal ===== */
.modal-overlay{
  position:fixed;inset:0;z-index:400;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;visibility:hidden;
  transition:opacity 0.35s ease,visibility 0.35s;
}
.modal-overlay::before{
  content:'';position:absolute;inset:0;
  background:rgba(28,25,23,0.45);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.modal-overlay.open{opacity:1;visibility:visible}

.modal-sheet{
  position:relative;z-index:1;
  background:var(--color-surface);border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  width:100%;max-width:500px;max-height:85vh;
  display:flex;flex-direction:column;
  transform:translateY(100%);
  transition:transform 0.4s var(--ease-spring);
  padding-bottom:var(--safe-bottom);
  box-shadow:0 -8px 40px rgba(28,25,23,0.12);
}
.modal-overlay.open .modal-sheet{transform:translateY(0)}

.modal-handle{
  width:36px;height:4px;background:var(--color-border);
  border-radius:2px;margin:10px auto;flex-shrink:0;
}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 24px 12px;flex-shrink:0;
}
.modal-title{font-size:1.1rem;font-weight:700;color:var(--color-text)}
.btn-modal-close{
  width:32px;height:32px;border-radius:50%;border:none;
  background:var(--stone-100);font-size:0.95rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--color-text-secondary);transition:all 0.15s;
}
.btn-modal-close:active{background:var(--stone-200);transform:scale(0.92)}
.modal-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 24px 24px;flex:1}

.modal-detail-grid{display:flex;flex-direction:column;gap:0}
.detail-block{padding:14px 0}
.detail-block+.detail-block{border-top:1px solid var(--color-border)}
.detail-block-title{
  font-size:0.68rem;font-weight:600;color:var(--color-text-muted);
  letter-spacing:0.5px;margin-bottom:10px;text-transform:uppercase;
}
.detail-row{
  display:grid;grid-template-columns:64px 1fr;gap:8px 12px;font-size:0.84rem;
}
.detail-row dt{color:var(--color-text-muted);font-weight:500}
.detail-row dd{color:var(--color-text)}
.detail-row .highlight{color:var(--red-600);font-weight:600}
.modal-body .detail-remark{
  font-size:0.8rem;color:var(--color-text-secondary);line-height:1.7;
  background:var(--stone-50);border-radius:var(--radius-xs);
  padding:10px 12px;
}
.modal-body .detail-remark.danger{background:var(--red-50);color:var(--red-600)}

/* ===== Empty State ===== */
.empty-state{
  text-align:center;padding:56px 20px;color:var(--color-text-muted);
}
.empty-state .empty-icon{font-size:2.5rem;margin-bottom:12px;display:block;opacity:0.6}
.empty-state .empty-text{font-size:0.85rem;color:var(--color-text-secondary)}

/* ===== Loading ===== */
.loading-skeleton{text-align:center;padding:20px;color:var(--color-text-muted);font-size:0.8rem}

/* ===== Animations ===== */
@keyframes fadeSlideUp{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}
.factory-card,.rec-card{animation:fadeSlideUp 0.35s var(--ease-out-expo) both}

/* ===== Responsive ===== */
@media(min-width:768px){
  body{max-width:600px;margin:0 auto;box-shadow:0 0 40px rgba(28,25,23,0.06);min-height:100vh}
  .factory-list{gap:14px;padding:0 20px 24px}
  .filter-section,.quick-pick,.search-wrap{padding-left:20px;padding-right:20px}
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-title">找厂认准虹程人力资源</div>
</header>

<!-- WeChat Bar -->
<div class="wechat-bar" id="wechatBar">
  <span class="label">📱 联系微信</span>
  <span class="wechat-id" id="wechatId">leeheesung_</span>
  <span class="copy-badge" id="copyBadge">长按复制</span>
  <button class="copy-btn" id="copyBtn">复制</button>
</div>

<!-- Tab Bar -->
<div class="tab-bar">
  <button class="tab-btn active" data-tab="recommend"><span class="tab-icon">⭐</span><span>精选推荐</span></button>
  <button class="tab-btn" data-tab="filter"><span class="tab-icon">🔍</span><span>全部筛选</span></button>
</div>

<!-- Recommend Tab -->
<div class="tab-panel active" id="tab-recommend">
  <div class="quick-pick" id="quickPick"></div>
  <div class="rec-section" id="recSection">
    <div class="rec-section-title">🏭 热门推荐</div>

function getTags(f){
  const t=[];
  if(f.shift.includes('长白班')) t.push('<span class="tag green">长白班</span>');
  else if(f.shift.includes('两班倒')) t.push('<span class="tag blue">两班倒</span>');
  if(f.features.includes('坐班')) t.push('<span class="tag green">坐班</span>');
  if(f.features.includes('五险')||f.features.includes('五险一金')) t.push('<span class="tag green">五险一金</span>');
  if(f.features.includes('日结')) t.push('<span class="tag amber">日结</span>');
  if(f.features.includes('不体检')) t.push('<span class="tag green">不体检</span>');
  if(f.features.includes('包吃住')||f.features.includes('厂吃厂住')) t.push('<span class="tag blue">包吃住</span>');
  if(f.features.includes('不穿无尘服')) t.push('<span class="tag green">不穿无尘服</span>');
  if(f.features.includes('大龄工')) t.push('<span class="tag amber">大龄工</span>');
  if(f.features.includes('预支')) t.push('<span class="tag green">可预支</span>');
  if(f.features.includes('国企')) t.push('<span class="tag green">国企</span>');
  if(f.features.includes('德企')) t.push('<span class="tag green">优质外企</span>');
  return t.join('');
}

function getFilteredData(){
  let data=factoryData;
  if(state.areaFilter!=='全部') data=data.filter(f=>f.area===state.areaFilter);
  if(state.shiftFilter!=='全部') data=data.filter(f=>f.shift.includes(state.shiftFilter));
  if(state.paymentFilter!=='全部') data=data.filter(f=>(f.salary+f.features+(f.remark||'')).includes(state.paymentFilter));
  const q=state.searchQuery.toLowerCase().trim();
  if(q) data=data.filter(f=>(f.name+f.fullName+f.area+f.address+f.category+f.salary+f.features+(f.remark||'')).toLowerCase().includes(q));
  return data;
}

function renderFilters(bar,items,key,cls){
  bar.innerHTML=items.map(i=>`<button class="filter-chip${i===state[key]?' active':''}" data-${cls}="${i}">${i}</button>`).join('');
  bar.querySelectorAll(`[data-${cls}]`).forEach(chip=>{chip.addEventListener('click',()=>{state[key]=chip.dataset[cls];renderAreas();renderShiftFilters();renderPaymentFilters();renderResults()})});
}
function renderAreas(){renderFilters(dom.areaBar,areas,'areaFilter','area')}
function renderShiftFilters(){renderFilters(dom.shiftBar,shiftFilters,'shiftFilter','shift')}

function switchTab(tab){
  state.currentTab=tab;
  $$('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  $$('.tab-panel').forEach(p=>p.classList.toggle('active',p.id==='tab-'+tab));
  if(tab==='recommend'){renderQuickPick();renderRecommendedDetail()}
  if(tab==='filter'){renderAreas();renderShiftFilters();renderPaymentFilters();renderResults()}
  window.scrollTo({top:0,behavior:'smooth'});
}

function handleSearch(value){state.searchQuery=value;dom.searchClear.classList.toggle('visible',value.length>0);renderResults()}

function copyWechat(){
  const id=dom.wechatId.textContent;
  const done=()=>{dom.copyBadge.textContent='已复制 ✓';dom.copyBadge.classList.add('copied');setTimeout(()=>{dom.copyBadge.textContent='长按复制';dom.copyBadge.classList.remove('copied')},2000)};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(id).then(done).catch(()=>{fallbackCopy(id);done()})}else{fallbackCopy(id);done()}
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy')}catch(e){}
  document.body.removeChild(ta);
}
let longPressTimer=null;
dom.wechatId.addEventListener('touchstart',()=>{longPressTimer=setTimeout(()=>copyWechat(),500)});
dom.wechatId.addEventListener('touchend',()=>clearTimeout(longPressTimer));
dom.wechatId.addEventListener('touchmove',()=>clearTimeout(longPressTimer));

function init(){
  renderAreas();renderShiftFilters();renderPaymentFilters();switchTab('recommend');
  $$('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>switchTab(btn.dataset.tab)));
  dom.searchInput.addEventListener('input',e=>handleSearch(e.target.value));
  dom.searchClear.addEventListener('click',()=>{dom.searchInput.value='';handleSearch('')});
  dom.modalClose.addEventListener('click',closeDetail);
  dom.modalOverlay.addEventListener('click',e=>{if(e.target===dom.modalOverlay)closeDetail()});
  dom.copyBtn.addEventListener('click',copyWechat);
}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',init)}else{init()}
</script>
</body>
</html>
